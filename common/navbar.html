<script>
  (function () {
    const path = window.location.pathname.replace(/\/+$/, "") || "/index.html";

    const normalize = (href) => {
      const clean = (href || "").replace(/\/+$/, "");
      return clean === "" ? "/index.html" : clean;
    };

    const currentPath = path === "/" ? "/index.html" : path;

    document.querySelectorAll(".nav-link").forEach(link => {
      const href = normalize(link.getAttribute("href"));
      if (href === currentPath) {
        link.classList.add("text-teal-700", "font-semibold");
        link.classList.remove("text-slate-700");
      }
    });

    document.querySelectorAll(".mobile-nav-link").forEach(link => {
      const href = normalize(link.getAttribute("href"));
      if (href === currentPath) {
        link.classList.add("text-teal-700", "font-semibold", "bg-teal-50");
        link.classList.remove("text-slate-800");
      }
    });

    document.querySelectorAll(".contact-cta, .mobile-contact-link").forEach(link => {
      const href = normalize(link.getAttribute("href"));
      if (href === currentPath) {
        link.classList.add("ring-2", "ring-teal-200");
      }
    });
  })();
</script>
