<section class="reveal-section bg-[#F7FAF9] px-4 sm:px-6 py-12 sm:py-14 md:py-24">
  <div class="max-w-5xl mx-auto bg-white rounded-[2rem] border border-slate-200 shadow-sm p-6 sm:p-8 md:p-10">

    <div class="reveal-item text-center max-w-2xl mx-auto">
      <p class="text-xs sm:text-sm uppercase tracking-[0.16em] text-teal-700 font-semibold">
        Application Form
      </p>

      <h2 class="mt-2 text-2xl sm:text-3xl md:text-4xl font-bold text-slate-900">
        Apply to work with GC Biotech Japan
      </h2>

      <p class="mt-3 text-sm sm:text-base text-slate-600">
        Tell us about your background, area of expertise, and the role you are seeking.
      </p>
    </div>

    <form
      action="https://formsubmit.co/santoshgothwalbio@gmail.com"
      method="POST"
      class="mt-10 space-y-6 max-w-3xl mx-auto reveal-item"
    >
      <input type="hidden" name="_subject" value="New Application">
      <input type="hidden" name="_captcha" value="false">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <input name="first_name" required placeholder="First Name"
          class="w-full rounded-xl border border-slate-300 px-4 py-3" />
        <input name="last_name" required placeholder="Last Name"
          class="w-full rounded-xl border border-slate-300 px-4 py-3" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <input name="email" type="email" required placeholder="Email"
          class="w-full rounded-xl border border-slate-300 px-4 py-3" />
        <input name="phone" placeholder="Phone"
          class="w-full rounded-xl border border-slate-300 px-4 py-3" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <select name="position_interest" required class="w-full rounded-xl border border-slate-300 px-4 py-3">
          <option disabled selected>Select Position</option>
          <option>Bioinformatics</option>
          <option>Molecular Biology</option>
          <option>Diagnostics</option>
        </select>

        <select name="experience_level" required class="w-full rounded-xl border border-slate-300 px-4 py-3">
          <option disabled selected>Experience Level</option>
          <option>Student</option>
          <option>Early Career</option>
          <option>Experienced</option>
        </select>
      </div>

      <input name="background" placeholder="Background"
        class="w-full rounded-xl border border-slate-300 px-4 py-3" />

      <input name="linkedin_profile" placeholder="LinkedIn Profile"
        class="w-full rounded-xl border border-slate-300 px-4 py-3" />

      <input name="cv_link" placeholder="CV / Portfolio Link"
        class="w-full rounded-xl border border-slate-300 px-4 py-3" />

      <textarea name="application_message" rows="6" required
        placeholder="Tell us about yourself..."
        class="w-full rounded-xl border border-slate-300 px-4 py-3"></textarea>

      <button type="submit"
        class="w-full rounded-xl bg-slate-900 text-white py-3 font-semibold hover:bg-teal-700">
        Submit Application
      </button>
    </form>

  </div>
</section>
